
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo de Mascotas Mágicas</title>
    <link rel="icon" type="image/png" href="/logo-mundo-magico.png" />
    <link rel="apple-touch-icon" href="/logo-mundo-magico.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .magic-bg {
            background: radial-gradient(circle at top right, #fef3c7, transparent),
                        radial-gradient(circle at bottom left, #e0f2fe, transparent),
                        linear-gradient(135deg, #fbcfe8 0%, #ffffff 100%);
            background-attachment: fixed;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0px); }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }
        .float-animation {
            animation: float 4s ease-in-out infinite;
        }
        .animate-fade-in {
            animation: fade-in 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
        h1, h2, h3 {
            font-family: 'Nunito', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c7d2fe;
            border-radius: 20px;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
